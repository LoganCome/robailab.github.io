groups:
  - title_zh: "机器人技术"
    title_en: "Robotics"
    items:
      - title_zh: "移动与野外机器人"
        title_en: "Mobile & Field Robots"
        text_zh: "探索机器人在动态真实环境中的感知、规划与自主行动。"
        text_en: "Exploring robotic perception, planning, and autonomous action in dynamic real-world environments."
      - title_zh: "机器人操作"
        title_en: "Manipulation"
        text_zh: "研究稳健的抓取、操作与人机交互能力。"
        text_en: "Studying robust grasping, manipulation, and human-robot interaction."
      - title_zh: "具身智能"
        title_en: "Embodied Intelligence"
        text_zh: "连接感知、控制、学习与物理实体。"
        text_en: "Connecting perception, control, learning, and physical embodiment."
  - title_zh: "人工智能"
    title_en: "Artificial Intelligence"
    items:
      - title_zh: "感知与学习"
        title_en: "Perception & Learning"
        text_zh: "研究视觉感知、表征学习与智能决策方法。"
        text_en: "Studying visual perception, representation learning, and intelligent decision-making."
      - title_zh: "机器人学习"
        title_en: "Robot Learning"
        text_zh: "探索模仿学习、强化学习与多模态学习在机器人自主系统中的应用。"
        text_en: "Exploring imitation, reinforcement, and multimodal learning for robot autonomy."
      - title_zh: "可靠自主系统"
        title_en: "Reliable Autonomy"
        text_zh: "提升智能系统的泛化性、可解释性与可靠性。"
        text_en: "Improving the generalization, interpretability, and reliability of intelligent systems."
