  <title
     id="title">Y-Matter Lab refined editable logo with split Y segments and restored stem</title>
  <desc
     id="desc">A modern editable SVG logo for Y-Matter Lab. The Y icon is split into three separate editable segments: left arm, right arm, and stem, for easier editing in Inkscape. The stem uses its own vertical gradient so it renders reliably.</desc>
