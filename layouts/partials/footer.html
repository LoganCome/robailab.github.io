<footer class="site-footer">
  <div class="container footer-inner">
    <div>
      <strong>{{ site.Params.lab_name }}</strong><br>
      {{ site.Params.affiliation }}
      {{ with site.Params.address }}<br>{{ . }}{{ end }}
    </div>
    <div>
      {{ with site.Params.email }}<a href="mailto:{{ . }}">{{ . }}</a><br>{{ end }}
      {{ with site.GetPage "/disclaimer" }}<a href="{{ .RelPermalink }}">{{ i18n "disclaimer" }}</a>{{ end }}
      <p>{{ i18n "development_note" }}</p>
    </div>
  </div>
</footer>
