<header class="site-header">
  <div class="container header-inner">
    <a class="site-brand" href="{{ site.Home.RelPermalink }}" aria-label="{{ site.Data.settings.site.lab_name }} home">
      {{ with site.Data.settings.site.logo }}<img class="site-brand-logo" src="{{ . | relURL }}" alt="">{{ else }}<span class="site-brand-mark" aria-hidden="true">R</span>{{ end }}
      <span class="site-brand-text"><strong>RobAI</strong><span>-Club</span></span>
    </a>
    <div class="header-actions">
      <nav aria-label="Main navigation">
        <ul class="nav-list">
          {{ range site.Menus.main }}
            <li><a href="{{ .URL }}">{{ .Name }}</a></li>
          {{ end }}
        </ul>
      </nav>
      {{ with .Translations }}
      <nav class="language-switcher" aria-label="Language switcher">
        {{ range . }}
          <a href="{{ .RelPermalink }}" lang="{{ .Language.LanguageCode }}">{{ if eq .Language.Lang "zh" }}中文{{ else }}EN{{ end }}</a>
        {{ end }}
      </nav>
      {{ end }}
    </div>
  </div>
</header>
