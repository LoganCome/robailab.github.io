{{ define "main" }}
<article class="page-header">
  <h1>{{ .Title }}</h1>
  {{ with .Content }}<div class="page-intro">{{ . }}</div>{{ end }}
</article>

<section class="honors-grid" aria-label="{{ .Title }}">
  {{ range site.Data.honors }}
  <article class="honor-card">
    <h2>{{ if eq site.Language.Lang "zh" }}{{ .zh }}{{ else }}{{ .en }}{{ end }}</h2>
    <p>{{ if eq site.Language.Lang "zh" }}{{ .level_zh }}{{ else }}{{ .level_en }}{{ end }}</p>
  </article>
  {{ end }}
</section>
{{ end }}
